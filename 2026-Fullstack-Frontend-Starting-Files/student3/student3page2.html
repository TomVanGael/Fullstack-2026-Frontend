    <form>
        <h1>Lidmaatschap formulier</h1>

        <div class="membership-form">
            <label for="lastName" class="form-label">Achternaam:</label>
            <input type="text" id="lastName" class="form-input" placeholder="Vul je achternaam in">
        </div>
        <div class="membership-form">
            <label for="firstName" class="form-label">Voornaam:</label>
            <input type="text" id="firstName" class="form-input" placeholder="Vul je voornaam in">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">E-mail:</label>
            <input type="email" id="email" class="form-input" placeholder="Vul je e-mail in">
        </div>
        <div>
            <label for="trainer">Trainer (optioneel)</label>
            <select name="trainer" id="trainer">
                <option>trainers aan het laden</option>
            </select>
        </div>
        <div>
            <label for="membership">Gekozen abonnement:</label>
            <select name="membership" id="membership">
                <option value="basis">Basis</option>
                <option value="premium">Premium</option>
                <option value="gigachad">Gigachad</option>
            </select>
        </div>
    </form>
